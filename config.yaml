  model: "{your_model_name}"
  temperature: 0.1
  top_p: 0.7
  max_tokens: 2000
  max_retries: 3

pipeline:
  concurrency: 3
  input_path: "data/input/task2_conversations.json"
  output_path: "data/output/results_moke.json"